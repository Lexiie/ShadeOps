<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ShadeOps private payout operator console</title>
  <desc id="desc">A dark operator dashboard showing a payout intent, recipient resolution, policy gate, privacy route, admin signing, and verified proof record.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07110F"/>
      <stop offset="0.55" stop-color="#101616"/>
      <stop offset="1" stop-color="#1B1712"/>
    </linearGradient>
    <linearGradient id="panel" x1="120" y1="108" x2="1280" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17211F"/>
      <stop offset="1" stop-color="#0E1414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#62F0B2"/>
      <stop offset="1" stop-color="#F8C35B"/>
    </linearGradient>
    <filter id="shadow" x="80" y="70" width="1240" height="650" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <circle cx="1180" cy="116" r="220" fill="#62F0B2" opacity="0.06"/>
  <circle cx="154" cy="632" r="260" fill="#F8C35B" opacity="0.05"/>

  <g filter="url(#shadow)">
    <rect x="110" y="88" width="1180" height="584" rx="24" fill="url(#panel)" stroke="#2D3A36"/>
    <rect x="110" y="88" width="1180" height="66" rx="24" fill="#13201D"/>
    <rect x="110" y="132" width="1180" height="22" fill="#13201D"/>
    <circle cx="154" cy="121" r="8" fill="#F87171"/>
    <circle cx="182" cy="121" r="8" fill="#FBBF24"/>
    <circle cx="210" cy="121" r="8" fill="#62F0B2"/>
    <text x="246" y="128" fill="#E9F4EE" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">ShadeOps Agent</text>
    <text x="1124" y="128" fill="#62F0B2" font-family="JetBrains Mono, monospace" font-size="14">DEVNET</text>

    <rect x="146" y="188" width="364" height="420" rx="18" fill="#0B1111" stroke="#283531"/>
    <text x="174" y="226" fill="#F8C35B" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">PAYOUT INTENT</text>
    <rect x="174" y="248" width="308" height="116" rx="14" fill="#111A18" stroke="#2D3A36"/>
    <text x="196" y="284" fill="#E9F4EE" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Pay Alice 50 USDC</text>
    <text x="196" y="316" fill="#96A39D" font-family="Inter, Arial, sans-serif" font-size="15">privately for the bounty round.</text>
    <rect x="174" y="392" width="145" height="64" rx="12" fill="#13201D" stroke="#2F4C42"/>
    <text x="194" y="418" fill="#96A39D" font-family="Inter, Arial, sans-serif" font-size="12">Recipient</text>
    <text x="194" y="442" fill="#62F0B2" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Resolved</text>
    <rect x="337" y="392" width="145" height="64" rx="12" fill="#191711" stroke="#5C4827"/>
    <text x="357" y="418" fill="#96A39D" font-family="Inter, Arial, sans-serif" font-size="12">Treasury</text>
    <text x="357" y="442" fill="#F8C35B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Checked</text>
    <rect x="174" y="486" width="308" height="76" rx="14" fill="#111A18" stroke="#2D3A36"/>
    <text x="196" y="516" fill="#96A39D" font-family="JetBrains Mono, monospace" font-size="12">Authority boundary</text>
    <text x="196" y="544" fill="#E9F4EE" font-family="Inter, Arial, sans-serif" font-size="16">Agent drafts. Admin signs.</text>

    <rect x="548" y="188" width="364" height="420" rx="18" fill="#0B1111" stroke="#283531"/>
    <text x="576" y="226" fill="#62F0B2" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">DETERMINISTIC GATES</text>
    <g font-family="Inter, Arial, sans-serif" font-size="15">
      <rect x="576" y="254" width="308" height="58" rx="12" fill="#11201A" stroke="#2F4C42"/>
      <text x="600" y="289" fill="#E9F4EE">Policy status: pass</text>
      <circle cx="852" cy="283" r="8" fill="#62F0B2"/>
      <rect x="576" y="330" width="308" height="58" rx="12" fill="#1D1A11" stroke="#5C4827"/>
      <text x="600" y="365" fill="#E9F4EE">Route: Umbra receiver-claimable</text>
      <circle cx="852" cy="359" r="8" fill="#F8C35B"/>
      <rect x="576" y="406" width="308" height="58" rx="12" fill="#111A18" stroke="#2D3A36"/>
      <text x="600" y="441" fill="#E9F4EE">Admin wallet signature required</text>
      <circle cx="852" cy="435" r="8" fill="#7DD3FC"/>
      <rect x="576" y="482" width="308" height="58" rx="12" fill="#111A18" stroke="#2D3A36"/>
      <text x="600" y="517" fill="#E9F4EE">No server-side private keys</text>
      <circle cx="852" cy="511" r="8" fill="#A78BFA"/>
    </g>

    <rect x="950" y="188" width="304" height="420" rx="18" fill="#0B1111" stroke="#283531"/>
    <text x="978" y="226" fill="#7DD3FC" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">VERIFIED PROOF</text>
    <rect x="978" y="252" width="248" height="84" rx="14" fill="#111A18" stroke="#2D3A36"/>
    <text x="1000" y="284" fill="#96A39D" font-family="Inter, Arial, sans-serif" font-size="12">Execution refs</text>
    <text x="1000" y="312" fill="#E9F4EE" font-family="JetBrains Mono, monospace" font-size="15">2 confirmed signatures</text>
    <rect x="978" y="358" width="248" height="84" rx="14" fill="#11201A" stroke="#2F4C42"/>
    <text x="1000" y="390" fill="#96A39D" font-family="Inter, Arial, sans-serif" font-size="12">Admin signer</text>
    <text x="1000" y="418" fill="#62F0B2" font-family="JetBrains Mono, monospace" font-size="15">verified</text>
    <rect x="978" y="464" width="248" height="84" rx="14" fill="#1D1A11" stroke="#5C4827"/>
    <text x="1000" y="496" fill="#96A39D" font-family="Inter, Arial, sans-serif" font-size="12">Decision hash</text>
    <text x="1000" y="524" fill="#F8C35B" font-family="JetBrains Mono, monospace" font-size="15">9f42...d1a8</text>

    <path d="M510 392 C532 392 526 392 548 392" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <path d="M912 392 C934 392 928 392 950 392" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
